services:
  mysql:
    image: mysql:8.0
    container_name: finance-mysql
    environment:
      MYSQL_ROOT_PASSWORD: finance@2026
      MYSQL_DATABASE: finance_db
      MYSQL_USER: finance
      MYSQL_PASSWORD: finance_pass
      TZ: Asia/Shanghai
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/prisma:/docker-entrypoint-initdb.d:ro
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pfinance@2026"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - finance-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finance-backend
    environment:
      - DATABASE_URL=mysql://finance:finance_pass@mysql:3306/finance_db
      - JWT_SECRET=finance_super_secret_change_in_production_2026!
      - JWT_EXPIRES_IN=7d
      - PORT=3000
      - TZ=Asia/Shanghai
      - NODE_ENV=production
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - finance-net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finance-frontend
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - finance-net

volumes:
  mysql_data:
    name: finance-mysql-data

networks:
  finance-net:
    driver: bridge
    name: finance-network
