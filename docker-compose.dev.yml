services:
  mysql:
    image: mysql:8.0
    container_name: finance-mysql-dev
    environment:
      MYSQL_ROOT_PASSWORD: finance@2026
      MYSQL_DATABASE: finance_db
      MYSQL_USER: finance
      MYSQL_PASSWORD: finance_pass
      TZ: Asia/Shanghai
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_dev_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pfinance@2026"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - finance-dev-net

  backend:
    image: node:18-alpine
    container_name: finance-backend-dev
    working_dir: /app
    command: sh -c "npm ci --registry=https://registry.npmmirror.com && npx prisma generate && npx prisma migrate deploy && npm run start:dev"
    environment:
      - DATABASE_URL=mysql://finance:finance_pass@mysql:3306/finance_db
      - JWT_SECRET=finance_dev_secret_2026!
      - JWT_EXPIRES_IN=7d
      - PORT=3000
      - TZ=Asia/Shanghai
      - NODE_ENV=development
    volumes:
      - ./backend/src:/app/src:ro
      - ./backend/prisma:/app/prisma:ro
      - ./backend/package.json:/app/package.json:ro
      - ./backend/package-lock.json:/app/package-lock.json:ro
      - ./backend/tsconfig.json:/app/tsconfig.json:ro
      - ./backend/tsconfig.build.json:/app/tsconfig.build.json:ro
      - ./backend/nest-cli.json:/app/nest-cli.json:ro
      - backend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - finance-dev-net

  frontend:
    image: node:18-alpine
    container_name: finance-frontend-dev
    working_dir: /app
    command: sh -c "npm ci --registry=https://registry.npmmirror.com && npm run dev -- --host 0.0.0.0"
    environment:
      - NODE_ENV=development
      - VITE_API_BASE_URL=/api
    volumes:
      - ./src:/app/src:ro
      - ./index.html:/app/index.html:ro
      - ./package.json:/app/package.json:ro
      - ./package-lock.json:/app/package-lock.json:ro
      - ./vite.config.ts:/app/vite.config.ts:ro
      - ./tsconfig.json:/app/tsconfig.json:ro
      - ./tsconfig.node.json:/app/tsconfig.node.json:ro
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - finance-dev-net

volumes:
  mysql_dev_data:
    name: finance-mysql-dev-data
  backend_node_modules:
    name: finance-backend-node-modules
  frontend_node_modules:
    name: finance-frontend-node-modules

networks:
  finance-dev-net:
    driver: bridge
    name: finance-dev-network
